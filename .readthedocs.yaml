# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    # Install the package itself so autodoc can import it (pulls in aiohttp),
    - method: pip
      path: .
    # then the docs-only tooling (Sphinx, theme, extensions).
    - requirements: docs/requirements.txt

formats:
  - pdf
  - epub
